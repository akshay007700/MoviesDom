<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoviesDom - Cinematic Experience</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-section">
                <a href="#" class="logo">
                    <i class="fas fa-film"></i> <span class="gradient-text">MoviesDom</span>
                </a>
                <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
            </div>
            
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="movies.html">Movies</a>
                <a href="movie-trailers.html">Trailers</a>
                <a href="news.html">News</a>
                <div class="nav-dropdown">
                    <button class="user-btn"><i class="fas fa-user-circle"></i> Account</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-carousel" id="heroCarousel">
        <div class="loading-spinner"></div>
    </header>

    <section class="search-section">
        <div class="container">
            <div class="search-box-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="globalSearch" placeholder="Search movies, actors, directors...">
                <button class="search-btn">Search</button>
            </div>
        </div>
    </section>

    <main class="container main-content">
        
        <section class="movie-section">
            <div class="section-header">
                <h2 class="gradient-text">Trending Now</h2>
                <a href="#" class="see-all">View All <i class="fas fa-chevron-right"></i></a>
            </div>
            <div class="movies-grid" id="trendingMovies"></div>
        </section>

        <section class="movie-section">
            <div class="section-header">
                <h2 class="gradient-text">Now Playing</h2>
                <a href="#" class="see-all">View All <i class="fas fa-chevron-right"></i></a>
            </div>
            <div class="movies-grid" id="nowPlayingMovies"></div>
        </section>

        <section class="movie-section">
            <div class="section-header">
                <h2 class="gradient-text">Coming Soon</h2>
                <a href="#" class="see-all">View All <i class="fas fa-chevron-right"></i></a>
            </div>
            <div class="movies-grid" id="upcomingMovies"></div>
        </section>

    </main>

    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-brand">
                <h3>MoviesDom</h3>
                <p>Designed for movie lovers.</p>
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
            </div>
            <div class="copyright">
                &copy; 2025 MoviesDom. educational purpose only.
            </div>
        </div>
    </footer>

    <script src="home.js"></script>
</body>
</html>
